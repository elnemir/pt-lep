---
- name: Main | Configure | syslog | Gathering service facts
  ansible.builtin.service_facts:

- name: Main | Configure | syslog | Detecting installed syslog services
  ansible.builtin.set_fact:
    rsyslog_service_present: "{{ 'rsyslog.service' in ansible_facts.services or 'rsyslog' in ansible_facts.services }}"
    syslog_ng_service_present: "{{ 'syslog-ng.service' in ansible_facts.services or 'syslog-ng' in ansible_facts.services }}"
    rsyslog_service_state: "{{ (ansible_facts.services['rsyslog.service'].state if 'rsyslog.service' in ansible_facts.services else (ansible_facts.services['rsyslog'].state if 'rsyslog' in ansible_facts.services else 'absent')) }}"
    syslog_ng_service_state: "{{ (ansible_facts.services['syslog-ng.service'].state if 'syslog-ng.service' in ansible_facts.services else (ansible_facts.services['syslog-ng'].state if 'syslog-ng' in ansible_facts.services else 'absent')) }}"

- name: Main | Configure | syslog | Selecting rsyslog when only rsyslog is installed
  when:
    - rsyslog_service_present
    - not syslog_ng_service_present
  ansible.builtin.set_fact:
    syslog_name: rsyslogd

- name: Main | Configure | syslog | Selecting syslog-ng when only syslog-ng is installed
  when:
    - syslog_ng_service_present
    - not rsyslog_service_present
  ansible.builtin.set_fact:
    syslog_name: syslog-ng

- name: Main | Configure | syslog | Selecting active syslog service when both are installed
  when:
    - rsyslog_service_present
    - syslog_ng_service_present
  ansible.builtin.set_fact:
    syslog_name: "{{ 'rsyslogd' if rsyslog_service_state == 'running' and syslog_ng_service_state != 'running' else ('syslog-ng' if syslog_ng_service_state == 'running' and rsyslog_service_state != 'running' else 'rsyslogd') }}"

- name: Main | Configure | syslog | Installing rsyslog
  when: syslog_name is not defined
  block:
    - name: Starting rsyslog installation
      ansible.builtin.import_tasks: install/with_repos/rsyslogd.yml

    - ansible.builtin.set_fact:
        syslog_name: 'rsyslogd'

- name: Main | Configure | syslog | Configuring rsyslog
  when: syslog_name == 'rsyslogd'
  ansible.builtin.import_tasks: configure/rsyslogd.yml

- name: Main | Configure | syslog | Configuring syslog-ng
  when: syslog_name == 'syslog-ng'
  ansible.builtin.import_tasks: configure/syslog-ng.yml
