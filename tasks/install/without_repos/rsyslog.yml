---
- name: Main | install | without_repos | rsyslog | Installing rsyslog without repositories (RHEL-based)
  when: ansible_os_family == 'RedHat' or ansible_os_family == 'REDOS' or ansible_os_family == 'RED'
  block:
    - name: Main | install | without_repos | rsyslog | Creating temporary directory
      ansible.builtin.tempfile:
        state: directory
        prefix: pkgs_rsyslog_
      register: tmp_dir

    - name: Main | install | without_repos | rsyslog | Resolving package directory (RHEL-based)
      ansible.builtin.set_fact:
        rsyslog_rpm_dir: "{{ (packages_dirs.rpm | selectattr('dist', 'equalto', ansible_distribution) | selectattr('ver', 'equalto', ansible_distribution_major_version) | map(attribute='dir_name') | list | first | default('')) }}"

    - name: Main | install | without_repos | rsyslog | Verifying package directory mapping (RHEL-based)
      ansible.builtin.assert:
        that:
          - rsyslog_rpm_dir | length > 0
        fail_msg: "No offline rsyslog package mapping for {{ ansible_distribution }} {{ ansible_distribution_major_version }}. Use repository installation or add local packages."

    - name: Main | install | without_repos | rsyslog | Uploading rsyslog package
      ansible.builtin.copy:
        src: "files/packages/{{ rsyslog_rpm_dir }}/rsyslog/"
        dest: "{{ tmp_dir.path }}/"
        mode: '0700'

    - name: Main | install | without_repos | rsyslog | Checking uploaded rpm packages
      ansible.builtin.find:
        paths: "{{ tmp_dir.path }}"
        patterns: "*.rpm"
        file_type: file
      register: rsyslog_rpm_files

    - name: Main | install | without_repos | rsyslog | Verifying rpm package presence
      ansible.builtin.assert:
        that:
          - rsyslog_rpm_files.matched | int > 0
        fail_msg: "No local rpm files found for rsyslog installation in {{ tmp_dir.path }}."

    - name: Main | install | without_repos | rsyslog | Installing packages via rpm
      ansible.builtin.shell: "{{ 'dnf' if ansible_pkg_mgr in ['dnf', 'dnf5'] else 'yum' }} -y install {{ tmp_dir.path }}/*.rpm"

    - name: Main | install | without_repos | rsyslog | Cleaning temporary directory
      ansible.builtin.file:
        path: "{{ tmp_dir.path }}/"
        state: absent

- name: Main | install | without_repos | rsyslog | Installing rsyslog without repositories (Deb-based)
  when: ansible_os_family == 'Debian'
  block:
    - name: Main | install | without_repos | rsyslog | Creating temporary directory
      ansible.builtin.tempfile:
        state: directory
        prefix: pkgs_rsyslog_
      register: tmp_dir

    - name: Main | install | without_repos | rsyslog | Resolving package directory (Deb-based)
      ansible.builtin.set_fact:
        rsyslog_deb_dir: "{{ (packages_dirs.deb | selectattr('dist', 'equalto', ansible_distribution) | selectattr('ver', 'equalto', ansible_distribution_release) | map(attribute='dir_name') | list | first | default('')) }}"

    - name: Main | install | without_repos | rsyslog | Verifying package directory mapping (Deb-based)
      ansible.builtin.assert:
        that:
          - rsyslog_deb_dir | length > 0
        fail_msg: "No offline rsyslog package mapping for {{ ansible_distribution }} {{ ansible_distribution_release }}. Use repository installation or add local packages."

    - name: Main | install | without_repos | rsyslog | Uploading rsyslog package
      ansible.builtin.copy:
        src: "files/packages/{{ rsyslog_deb_dir }}/rsyslog/"
        dest: "{{ tmp_dir.path }}/"
        mode: '0700'

    - name: Main | install | without_repos | rsyslog | Checking uploaded deb packages
      ansible.builtin.find:
        paths: "{{ tmp_dir.path }}"
        patterns: "*.deb"
        file_type: file
      register: rsyslog_deb_files

    - name: Main | install | without_repos | rsyslog | Verifying deb package presence
      ansible.builtin.assert:
        that:
          - rsyslog_deb_files.matched | int > 0
        fail_msg: "No local deb files found for rsyslog installation in {{ tmp_dir.path }}."

    - name: Main | install | without_repos | rsyslog | Installing packages via apt
      environment:
        PATH: /usr/sbin:/sbin:{{ ansible_env.PATH }}
      ansible.builtin.shell: "/usr/bin/yes | /usr/bin/dpkg --install {{ tmp_dir.path }}/*.deb"

    - name: Main | install | without_repos | rsyslog | Cleaning temporary directory
      ansible.builtin.file:
        path: "{{ tmp_dir.path }}/"
        state: absent

- name: Main | install | without_repos | rsyslog | Gathering package facts
  when: ansible_os_family == 'Debian' or ansible_os_family == 'RedHat' or ansible_os_family == 'REDOS' or ansible_os_family == 'RED'
  ansible.builtin.package_facts:
    manager: auto

- name: Main | install | without_repos | rsyslog | Verifying package installation
  when: ansible_os_family == 'Debian' or ansible_os_family == 'RedHat' or ansible_os_family == 'REDOS' or ansible_os_family == 'RED'
  ansible.builtin.assert:
    that:
      - "'rsyslog' in ansible_facts.packages"
    fail_msg: Failed to install rsyslog package from local repository.

- name: Main | install | without_repos | rsyslog | Checking rsyslog version
  when: ansible_os_family == 'Debian' or ansible_os_family == 'RedHat' or ansible_os_family == 'REDOS' or ansible_os_family == 'RED'
  environment:
    PATH: /usr/sbin:/sbin:{{ ansible_env.PATH }}
  ansible.builtin.command: rsyslogd -v
  changed_when: false
